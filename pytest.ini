[pytest]
# Discover homework graders across the curriculum. (Templates are excluded so a fresh
# checkout's `make test` reflects real lesson progress, not the scaffold.)
testpaths = curriculum
python_files = test_*.py
# importlib mode lets many lessons share the filename test_homework.py without collisions.
addopts = -q --tb=short --import-mode=importlib
markers =
    slow: marks tests that take a while (deselect with '-m "not slow"')
